<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>эЖаьЭ╝ыаЫыз╡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --background: oklch(0.975 0.012 85);
      --foreground: oklch(0.22 0.025 50);
      --card: oklch(0.99 0.008 85);
      --primary: oklch(0.55 0.15 35);
      --primary-hover: oklch(0.5 0.15 35);
      --primary-foreground: oklch(0.98 0.01 85);
      --muted: oklch(0.94 0.015 80);
      --muted-foreground: oklch(0.5 0.02 60);
      --border: oklch(0.88 0.02 75);
      --accent: oklch(0.96 0.04 80);
      --success: oklch(0.62 0.13 150);
      --warning: oklch(0.75 0.15 75);
      --danger: oklch(0.6 0.2 25);
      --font-display: "Gowun Batang", "Noto Serif KR", serif;
      --font-sans: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-sans);
      color: var(--foreground);
      background-color: var(--background);
      background-image:
        radial-gradient(circle at 20% 10%, oklch(0.55 0.15 35 / 0.07), transparent 50%),
        radial-gradient(circle at 80% 90%, oklch(0.62 0.13 150 / 0.05), transparent 50%);
      min-height: 100vh;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .hero { margin-bottom: 32px; text-align: left; }
    .hero h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.4rem, 5vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
      color: var(--primary);
    }
    .hero-link {
      text-decoration: none;
      color: inherit;
      display: inline-block;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .hero-link:hover { opacity: 0.75; }
    .hero-link:active { opacity: 0.6; }
    .hero .subtitle {
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--muted-foreground);
      margin: 0;
      max-width: 540px;
    }
    .chat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px -20px oklch(0.55 0.15 35 / 0.18);
    }
    #chat {
      min-height: 380px;
      max-height: 60vh;
      overflow-y: auto;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      padding: 4px;
    }
    .msg {
      margin: 5px 0;
      padding: 9px 14px;
      border-radius: 14px;
      max-width: 85%;
      white-space: pre-wrap;
      line-height: 1.5;
      word-break: break-word;
      font-size: 0.95rem;
    }
    .msg.user {
      background: var(--primary);
      color: var(--primary-foreground);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      background: var(--muted);
      color: var(--foreground);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.loading {
      background: var(--muted);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .shimmer-text {
      font-style: italic;
      background: linear-gradient(
        90deg,
        oklch(0.5 0.02 60) 0%,
        oklch(0.5 0.02 60) 35%,
        var(--foreground) 50%,
        oklch(0.5 0.02 60) 65%,
        oklch(0.5 0.02 60) 100%
      );
      background-size: 200% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: shimmerSweep 1.8s linear infinite;
    }
    @keyframes shimmerSweep {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .msg.bot { line-height: 1.55; }
    .msg.bot .bh {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--foreground);
    }
    .msg.bot .bh.sp { margin-top: 0.7em; }
    .msg.bot .bli { padding-left: 0.2em; }
    .msg.bot .bem {
      color: var(--muted-foreground);
      font-style: italic;
      font-size: 0.85rem;
      margin-top: 0.4em;
    }
    .msg.bot .bimg {
      margin: 6px 0;
      max-width: 100%;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .msg.bot .prepare-wrap { margin: 6px 0; }
    .msg.bot .prepare-box {
      display: inline-block;
      background: var(--accent);
      color: oklch(0.4 0.1 50);
      padding: 10px 22px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.2;
      border: 1px dashed oklch(0.7 0.08 60);
    }
    .msg.bot .blink {
      display: block;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      margin-top: 4px;
    }
    .msg.bot .blink.sp { margin-top: 0.7em; }
    .msg.bot .blink:hover { text-decoration: underline; }

    form { display: flex; gap: 8px; }
    .input-wrap { position: relative; flex: 1; display: flex; }
    .input-wrap input {
      flex: 1;
      width: 100%;
      padding: 13px 60px 13px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 1rem;
      font-family: inherit;
      background: var(--card);
      color: var(--foreground);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap input::placeholder { color: oklch(0.6 0.02 60); }
    .input-wrap input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(0.55 0.15 35 / 0.12);
    }
    .char-counter {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.78rem;
      color: var(--muted-foreground);
      pointer-events: none;
      user-select: none;
      font-variant-numeric: tabular-nums;
    }
    .char-counter.warn { color: var(--warning); }
    .char-counter.max { color: var(--danger); font-weight: 600; }
    form > button {
      padding: 13px 24px;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.05s;
    }
    form > button:hover:not(:disabled) { background: var(--primary-hover); }
    form > button:active:not(:disabled) { transform: translateY(1px); }
    form > button:disabled {
      background: oklch(0.75 0.04 60);
      cursor: not-allowed;
    }

    .msg-wrap {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 6px;
      margin: 5px 0;
      align-self: flex-start;
      max-width: 95%;
    }
    .msg-wrap > .msg.bot { margin: 0 !important; align-self: auto; }
    .copy-btn {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 6px;
      padding: 5px 12px;
      background: var(--card);
      color: var(--muted-foreground);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .copy-btn:hover {
      background: var(--accent);
      color: var(--foreground);
      border-color: oklch(0.78 0.06 70);
    }
    .copy-btn.copied {
      background: var(--success);
      color: var(--primary-foreground);
      border-color: var(--success);
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <a href="/" class="hero-link" onclick="event.preventDefault(); location.reload();" aria-label="ьГИыбЬъ│аь╣и">
        <h1>эЖаьЭ╝ыаЫыз╡</h1>
      </a>
      <p class="subtitle">ъ┤АьХЕъ╡мьЭШ ызЫьзС┬╖ь╣┤эОШ┬╖ы░Ф эЩФьЮеьЛд ьЬДь╣Ш, ь▓нъ▓░ыПД ьаХы│┤ые╝ эХЬыИИьЧР.</p>
    </header>

    <section class="chat-card">
      <div id="chat">
        <div class="msg bot">ыздьЮеыкЕ ъ▓АьГЙэХ┤ы┤Р~ ъ┤АьХЕъ╡м эХлэФМыаИьЭ┤ьКд эЩФьЮеьЛд ьаХы│┤ ьХМыадьдДъ▓М! ЁЯЪ╗</div>
      </div>

      <form id="form">
        <div class="input-wrap">
          <input id="input" type="text" placeholder="ыздьЮеыкЕ ьЮЕыае (ьШИ: ьЩУьЦ┤ьЫРыНФ)" autocomplete="off" maxlength="30" required />
          <span id="charCounter" class="char-counter">0/30</span>
        </div>
        <button type="submit" id="sendBtn">ъ▓АьГЙ</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function escAttr(s) {
      return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }
    function escText(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    function renderInline(text) {
      let html = escText(text);
      html = html.replace(
        /\[([^\]]+)\]\(([^)]+)\)/g,
        (_, t, u) => `<a href="${escAttr(u)}" target="_blank" rel="noopener noreferrer">${t}</a>`,
      );
      return html;
    }
    function renderBotMessage(text) {
      let t = text.replace(
        /(ь▓нъ▓░ыПД:\s*)эЩХьЭ╕ эХДьЪФ/g,
        "$1ыжмы╖░ъ░А ьаБьЦ┤ эЩХьЭ╕ьЭ┤ ьЦ┤ыадьЫМ уЕауЕа ы░йым╕ ьЛЬ ьзБьаС эЩХьЭ╕эХШыКФ ъ▓М ьвЛьЭД ъ▓Г ъ░ЩьХД!",
      );
      t = t.replace(/^(\s*-\s*[^:\n]+:)\s*\n\s*(?!-)(.+)$/gm, "$1 $2");
      const lines = t.split("\n").filter((l) => /\S/.test(l));
      const out = [];
      for (const raw of lines) {
        const line = raw.trim();
        if (line === "ЁЯУН ъ╕░ы│╕ьаХы│┤") {
          out.push('<div class="bh">ЁЯУН ъ╕░ы│╕ьаХы│┤</div>');
        } else if (line === "ЁЯЪ╗ эЩФьЮеьЛд ьаХы│┤") {
          out.push('<div class="bh sp">ЁЯЪ╗ эЩФьЮеьЛд ьаХы│┤</div>');
        } else if (line === "ЁЯУ╕ ыздьЮе эЩФьЮеьЛд ьВмьзД") {
          out.push('<div><strong>ЁЯУ╕ ыздьЮе эЩФьЮеьЛд ьВмьзД</strong></div>');
        } else if (/^ьдАы╣Д ьдС\s*ЁЯШв$/.test(line)) {
          out.push('<div class="prepare-wrap"><span class="prepare-box">ьдАы╣Д ьдС ЁЯШв</span></div>');
        } else if (/^!\[([^\]]*)\]\(([^)]+)\)$/.test(line)) {
          const m = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
          out.push(`<img src="${escAttr(m[2])}" alt="${escAttr(m[1])}" class="bimg">`);
        } else if (line.startsWith("- ")) {
          const content = line.slice(2);
          const colonIdx = content.indexOf(":");
          let inner;
          if (colonIdx > 0) {
            const label = content.slice(0, colonIdx + 1);
            const value = content.slice(colonIdx + 1);
            inner = `<strong>${escText(label)}</strong>${renderInline(value)}`;
          } else {
            inner = renderInline(content);
          }
          out.push(`<div class="bli">тАв ${inner}</div>`);
        } else if (/^\[([^\]]+)\]\(([^)]+)\)$/.test(line)) {
          const m = line.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
          const isKakao = /ь╣┤ь╣┤ьШдыз╡/.test(m[1]);
          out.push(
            `<a href="${escAttr(m[2])}" target="_blank" rel="noopener noreferrer" class="blink${isKakao ? " sp" : ""}">${escText(m[1])}</a>`,
          );
        } else if (/^\*.+\*$/.test(line)) {
          out.push(`<div class="bem">${escText(line.slice(1, -1))}</div>`);
        } else {
          out.push(`<div>${renderInline(line)}</div>`);
        }
      }
      return out.join("");
    }

    function addMsg(text, role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      let isComplex = false;
      if (role === "bot") {
        const isInfoResponse = text.includes("ЁЯУН ъ╕░ы│╕ьаХы│┤");
        if (isInfoResponse) {
          div.innerHTML = renderBotMessage(text);
          isComplex = true;
        } else {
          div.textContent = text;
        }
      } else if (role === "loading") {
        const span = document.createElement("span");
        span.className = "shimmer-text";
        span.textContent = text;
        div.appendChild(span);
      } else {
        div.textContent = text;
      }

      if (isComplex) {
        const wrap = document.createElement("div");
        wrap.className = "msg-wrap";
        wrap.appendChild(div);

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "ы│╡ьВм";
        copyBtn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = "тЬУ ы│╡ьВмыРи";
            copyBtn.classList.add("copied");
            setTimeout(() => {
              copyBtn.textContent = "ы│╡ьВм";
              copyBtn.classList.remove("copied");
            }, 1500);
          } catch (err) {
            copyBtn.textContent = "ьЛдэМи уЕа";
          }
        });
        wrap.appendChild(copyBtn);
        chat.appendChild(wrap);
      } else {
        chat.appendChild(div);
      }
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    const charCounter = document.getElementById("charCounter");
    function updateCharCounter() {
      const len = input.value.length;
      charCounter.textContent = `${len}/30`;
      charCounter.classList.toggle("warn", len >= 26 && len < 30);
      charCounter.classList.toggle("max", len >= 30);
    }
    input.addEventListener("input", updateCharCounter);

    function isValidStoreName(text) {
      if (!text) return false;
      if (text.length < 2) return false;
      if (!/[ъ░А-эЮгa-zA-Z0-9]/.test(text)) return false;
      return true;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim().slice(0, 30);
      if (!text) return;
      if (!isValidStoreName(text)) {
        addMsg(text, "user");
        input.value = "";
        updateCharCounter();
        await sleep(200);
        addMsg("ьЭМ... ыздьЮеыкЕ ыДИым┤ ьззьХД! 2ъ╕АьЮР ьЭ┤ьГБьЬ╝ыбЬ ьЮЕыаеэХ┤ьдШ~", "bot");
        input.focus();
        return;
      }

      addMsg(text, "user");
      input.value = "";
      updateCharCounter();
      sendBtn.disabled = true;

      await sleep(300);
      addMsg(`${text} ъ▓АьГЙэХ┤ы│╝ъ▓М~`, "bot");

      const loading = addMsg("ьЧ┤ьЛмэЮИ ь░╛ыКФ ьдС...", "loading");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        loading.remove();

        if (data.error) {
          addMsg("ьХЧ, ьШдыеШ ыВмьЦ┤ уЕауЕа тАФ " + data.error, "bot");
        } else if (data.noResult) {
          await sleep(250);
          addMsg("ьЭМ... ъ╖╕ ыздьЮеьЭА ык╗ ь░╛ъ▓аьЦ┤ уЕауЕа", "bot");
          await sleep(300);
          const msg = addMsg(data.reply, "bot");
          const btn = document.createElement("button");
          btn.textContent = "ыЛдьЛЬ ь░╛ъ╕░";
          btn.style.cssText =
            "margin-top: 8px; padding: 6px 14px; background: var(--primary); color: var(--primary-foreground); border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-family: inherit;";
          btn.onclick = () => {
            input.value = "";
            updateCharCounter();
            input.focus();
          };
          msg.appendChild(document.createElement("br"));
          msg.appendChild(btn);
        } else {
          await sleep(250);
          addMsg("эН╝эОЩэК╕~ ь░╛ьХШьЦ┤!", "bot");
          await sleep(400);
          addMsg(data.reply, "bot");
        }
      } catch (err) {
        loading.remove();
        addMsg("ыДдэК╕ьЫМэБм ьШдыеШ: " + err.message, "bot");
      }

      sendBtn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
